<!DOCTYPE html>
<html>
<head>
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .flashcard {
      width: 300px;
      height: 200px;
      margin: auto;
      perspective: 1000px;
    }
    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .flashcard:hover .inner {
      transform: rotateY(180deg);
    }
    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 20px;
    }
    .back {
      transform: rotateY(180deg);
      background: #ff6b81;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Flashcard Demo</h1>

  <div class="flashcard">
    <div class="inner">
      <div class="front">Hola</div>
      <div class="back">Hello</div>
    </div>
  </div>
</div>

</body>
</html>
